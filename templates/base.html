<!DOCTYPE html>
<html>
<head>
    <title>World Cup App</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background-color: #f5f5f5;
        }

        /* ✅ NAVBAR */
        .navbar {
            background-color: #222;
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        .navbar a {
            color: white;
            margin: 0 20px;
            text-decoration: none;
            font-weight: bold;
        }

        .navbar a:hover {
            text-decoration: underline;
        }

        /* ✅ CONTENIDO */
        .container {
            padding: 20px;
            text-align: center;
        }

        table {
            margin: auto;
            border-collapse: collapse;
            width: 70%;
            background-color: white;
        }

        th, td {
            border: 1px solid #ddd;
            padding: 10px;
        }

        th {
            background-color: #333;
            color: white;
        }

        .gold { color: #d4af37; font-weight: bold; }
        .silver { color: #9e9e9e; font-weight: bold; }
        .bronze { color: #cd7f32; font-weight: bold; }
    </style>
</head>

<body>

<!-- ✅ NAVBAR -->
<div class="navbar">
    <a href="/api/dashboard/">Ranking</a>
    <a href="/api/matches/">Partidos</a>
</div>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
